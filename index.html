<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda Uñas</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#ffd6e7;
text-align:center;
padding:20px;
}

.caja{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input,select,button{
padding:10px;
margin:6px;
width:90%;
}

button{
background:#ff2e8a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#adminPanel{
display:none;
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
}

#calendar{
max-width:900px;
margin:40px auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

</style>

</head>

<body>

<h1>Agenda de Uñas 💅</h1>

<div class="caja">

<h3>Reservar hora</h3>

<input id="nombre" placeholder="Nombre">

<input id="telefono" placeholder="Teléfono (ej: 912345678)">

<input type="date" id="fecha">

<select id="hora"></select>

<button onclick="reservar()">Reservar</button>

</div>

<br>

<button onclick="login()">Portal Dueña</button>

<div id="adminPanel">

<h2>Calendario</h2>

<div id="calendar"></div>

<h2>Lista de clientas</h2>

<ul id="clientes"></ul>

<h2>Agenda completa</h2>

<table>

<tr>
<th>Cliente</th>
<th>Fecha</th>
<th>Hora</th>
<th>WhatsApp</th>
<th>Eliminar</th>
</tr>

<tbody id="tabla"></tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyC5BiLacxvvx7h9FqbYjLTHCmhpBgoswoY",
authDomain: "agenda-unas-764d1.firebaseapp.com",
databaseURL: "https://agenda-unas-764d1-default-rtdb.firebaseio.com/",
projectId: "agenda-unas-764d1",
storageBucket: "agenda-unas-764d1.firebasestorage.app",
messagingSenderId: "1025490676078",
appId: "1:1025490676078:web:f6ecda60cac080e3a5b97f"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const citasRef = ref(db,"citas");

let calendar;

let horasBase=[
"09:00","10:00","11:00","12:00",
"13:00","14:00","15:00","16:00",
"17:00","18:00"
];

document.addEventListener("DOMContentLoaded",function(){

calendar = new FullCalendar.Calendar(document.getElementById("calendar"),{

initialView:"dayGridMonth",
locale:"es",
events:[]

});

calendar.render();

});

window.reservar=function(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let fecha=document.getElementById("fecha").value;
let hora=document.getElementById("hora").value;

push(citasRef,{
nombre,
telefono,
fecha,
hora
});

alert("Reserva guardada 💅");

}

function actualizarHoras(fecha,citas){

let select=document.getElementById("hora");

select.innerHTML="";

horasBase.forEach(h=>{

let ocupado=citas.find(c=>c.fecha===fecha && c.hora===h);

if(!ocupado){

let op=document.createElement("option");

op.value=h;
op.textContent=h;

select.appendChild(op);

}

});

}

window.recordar=function(nombre,telefono,fecha,hora){

let limpio = telefono.replace(/\D/g,"");

if(limpio.startsWith("9")){
limpio="56"+limpio;
}

let mensaje=`Hola ${nombre}, te recordamos tu cita de uñas el ${fecha} a las ${hora} 💅`;

let url="https://wa.me/"+limpio+"?text="+encodeURIComponent(mensaje);

window.location.href=url;

}

onValue(citasRef,(snapshot)=>{

let eventos=[];
let tabla=document.getElementById("tabla");
let listaClientes=document.getElementById("clientes");

tabla.innerHTML="";
listaClientes.innerHTML="";

let clientes=new Set();
let citas=[];

snapshot.forEach((child)=>{

let c=child.val();
let key=child.key;

citas.push(c);

eventos.push({
title:c.nombre+" "+c.hora,
start:c.fecha
});

clientes.add(c.nombre);

tabla.innerHTML+=`
<tr>
<td>${c.nombre}</td>
<td>${c.fecha}</td>
<td>${c.hora}</td>
<td><button onclick="recordar('${c.nombre}','${c.telefono}','${c.fecha}','${c.hora}')">WhatsApp</button></td>
<td><button onclick="eliminar('${key}')">X</button></td>
</tr>
`;

});

calendar.removeAllEvents();
calendar.addEventSource(eventos);

clientes.forEach(c=>{
listaClientes.innerHTML+=`<li>${c}</li>`;
});

let fecha=document.getElementById("fecha").value;

if(fecha){
actualizarHoras(fecha,citas);
}

});

document.getElementById("fecha").addEventListener("change",()=>{

onValue(citasRef,(snapshot)=>{

let citas=[];

snapshot.forEach((child)=>{
citas.push(child.val());
});

actualizarHoras(document.getElementById("fecha").value,citas);

});

});

window.eliminar=function(key){

remove(ref(db,"citas/"+key));

}

window.login=function(){

let clave=prompt("Clave dueña");

if(clave=="1234"){

document.getElementById("adminPanel").style.display="block";

setTimeout(()=>{
calendar.updateSize();
},300);

}else{

alert("Clave incorrecta");

}

}

</script>

</body>
</html>
