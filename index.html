<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda de Uñas</title>

<style>

body{
font-family:Arial;
background:#ffe6f2;
padding:20px;
text-align:center;
}

h1{
color:#ff2e8a;
}

input,select,button{
padding:10px;
margin:5px;
width:90%;
max-width:300px;
}

button{
background:#ff2e8a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
background:white;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

</style>

</head>

<body>

<h1>Agenda de Uñas 💅</h1>

<h3>Reservar Hora</h3>

<input id="nombre" placeholder="Nombre">

<input id="telefono" placeholder="Teléfono">

<input type="date" id="fecha">

<select id="hora">

<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>12:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
<option>17:00</option>
<option>18:00</option>

</select>

<br>

<button onclick="reservar()">Reservar</button>

<h3>Citas</h3>

<table>

<tr>
<th>Cliente</th>
<th>Fecha</th>
<th>Hora</th>
</tr>

<tbody id="tabla"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyC5BiLacxvvx7h9FqbYjLTHCmhpBgoswoY",
authDomain: "agenda-unas-764d1.firebaseapp.com",
projectId: "agenda-unas-764d1",
storageBucket: "agenda-unas-764d1.firebasestorage.app",
messagingSenderId: "1025490676078",
appId: "1:1025490676078:web:f6ecda60cac080e3a5b97f"
};

const app = initializeApp(firebaseConfig);

const db=getFirestore(app);

async function reservar(){

let nombre=document.getElementById("nombre").value;

let telefono=document.getElementById("telefono").value;

let fecha=document.getElementById("fecha").value;

let hora=document.getElementById("hora").value;

await addDoc(collection(db,"citas"),{

nombre:nombre,
telefono:telefono,
fecha:fecha,
hora:hora

});

alert("Reserva guardada 💅");

mostrar();

}

async function mostrar(){

let tabla=document.getElementById("tabla");

tabla.innerHTML="";

const querySnapshot = await getDocs(collection(db,"citas"));

querySnapshot.forEach((doc)=>{

let c=doc.data();

tabla.innerHTML+=`

<tr>

<td>${c.nombre}</td>

<td>${c.fecha}</td>

<td>${c.hora}</td>

</tr>

`;

});

}

mostrar();

</script>

</body>

</html>
