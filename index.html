<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda de Uñas</title>

<style>

body{
font-family:Arial;
background:#ffe6f2;
padding:20px;
text-align:center;
}

h1{
color:#ff2e8a;
}

.caja{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input,select,button{
padding:10px;
margin:6px;
width:90%;
}

button{
background:#ff2e8a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
background:white;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

#admin{
display:none;
}

</style>

</head>

<body>

<h1>Agenda de Uñas 💅</h1>

<div class="caja">

<h3>Reservar Hora</h3>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input type="date" id="fecha">
<select id="hora">

<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>12:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
<option>17:00</option>
<option>18:00</option>

</select>

<button onclick="reservar()">Reservar</button>

</div>

<br>

<button onclick="login()">Panel Dueña</button>

<div id="admin">

<h3>Agenda completa</h3>

<table>

<tr>
<th>Cliente</th>
<th>Fecha</th>
<th>Hora</th>
<th>WhatsApp</th>
<th>Eliminar</th>
</tr>

<tbody id="tabla"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyC5BiLacxvvx7h9FqbYjLTHCmhpBgoswoY",
authDomain: "agenda-unas-764d1.firebaseapp.com",
databaseURL: "https://agenda-unas-764d1-default-rtdb.firebaseio.com/",
projectId: "agenda-unas-764d1",
storageBucket: "agenda-unas-764d1.firebasestorage.app",
messagingSenderId: "1025490676078",
appId: "1:1025490676078:web:f6ecda60cac080e3a5b97f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const citasRef = ref(db,"citas");

window.reservar=function(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let fecha=document.getElementById("fecha").value;
let hora=document.getElementById("hora").value;

push(citasRef,{
nombre:nombre,
telefono:telefono,
fecha:fecha,
hora:hora
});

let mensaje="Hola 😊 tu hora de uñas fue reservada para "+fecha+" a las "+hora+" 💅";

let url="https://wa.me/56"+telefono+"?text="+encodeURIComponent(mensaje);

window.open(url);

alert("Reserva realizada");

}

onValue(citasRef,(snapshot)=>{

let tabla=document.getElementById("tabla");

tabla.innerHTML="";

snapshot.forEach((child)=>{

let c=child.val();
let key=child.key;

tabla.innerHTML+=`

<tr>

<td>${c.nombre}</td>
<td>${c.fecha}</td>
<td>${c.hora}</td>

<td>
<button onclick="recordar('${c.telefono}','${c.fecha}','${c.hora}')">
Recordar
</button>
</td>

<td>
<button onclick="eliminar('${key}')">
X
</button>
</td>

</tr>

`;

});

});

window.eliminar=function(key){
remove(ref(db,"citas/"+key));
}

window.recordar=function(tel,fecha,hora){

let mensaje="Hola 😊 te recuerdo tu hora de uñas el "+fecha+" a las "+hora+" 💅";

let url="https://wa.me/56"+tel+"?text="+encodeURIComponent(mensaje);

window.open(url);

}

window.login=function(){

let clave=prompt("Clave de dueña");

if(clave=="1234"){

document.getElementById("admin").style.display="block";

}else{

alert("Clave incorrecta");

}

}

</script>

</body>

</html>
